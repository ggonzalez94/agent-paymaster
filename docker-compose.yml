services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HEALTHCHECK_URL: http://localhost:3000/health
    volumes:
      - servo-data:/app/data

  bundler:
    build: .
    command: ["node", "packages/bundler/dist/index.js"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      HEALTHCHECK_URL: http://localhost:3001/health
    volumes:
      - servo-data:/app/data

volumes:
  servo-data:
